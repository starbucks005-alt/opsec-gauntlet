<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Routing Report · The Gauntlet</title>
<meta name="description" content="What the panel said. Where your idea stands. What to do next.">
<link rel="icon" type="image/png" href="Favicon.png">
<link rel="apple-touch-icon" href="Favicon.png">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  /* DOCUMENT MODE PALETTE
     The deliverable view reads as a professional white paper, not as
     the dark website chrome. The topbar (site navigation) keeps its
     dark identity via hardcoded values further down so users still
     have a clear chrome/document divide. Everything inside <main>
     renders on warm cream paper with deep ink type and gold accents
     adjusted for legibility on a light background. */
  :root,
  :root[data-theme="dark"]{
    --bg:#ffffff;
    --ink:#1a1a1a;
    --ink-soft:#f4f4f2;
    --cream:#1a1a1a;
    --gold:#8a6e1d;
    --gold-light:#a68220;
    --rule:rgba(0,0,0,0.14);
    --rule-soft:rgba(0,0,0,0.08);
    --text:#1a1a1a;
    --text-dim:#5a5550;
    --crimson:#5a1a1a;
    --crimson-bright:#a82a1f;
    --gauntlet-consequence:#a82a1f;
    --card:rgba(0,0,0,0.025);
    --card-soft:rgba(0,0,0,0.015);
    --card-strong:rgba(0,0,0,0.04);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Cormorant Garamond',serif;font-size:1.05rem;line-height:1.7;
    min-height:100vh;
  }

  /* Topbar - keeps the site's dark identity (this is the website chrome,
     not the document). The document begins below it inside <main>. */
  .tg-topbar{
    display:flex;align-items:center;padding:0 2.5rem;height:56px;
    border-bottom:1px solid rgba(184,146,42,0.25);gap:1.5rem;
    position:sticky;top:0;
    background:rgba(10,10,10,0.95);backdrop-filter:blur(10px);z-index:100;
  }
  .tg-topbar-logo{
    display:flex;align-items:center;gap:0.6rem;
    font-family:'Playfair Display',serif;font-size:1rem;letter-spacing:0.12em;
    color:#b8922a;text-decoration:none;
  }
  .tg-topbar-logo img{height:32px;width:32px;display:block;object-fit:contain;}
  .tg-topbar-back{
    margin-left:auto;
    font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.22em;
    text-transform:uppercase;color:#a89c88;text-decoration:none;
  }
  .tg-topbar-back:hover{color:#b8922a;}

  main{max-width:780px;margin:0 auto;padding:3.5rem 2rem 5rem;background:#fff;}

  /* ── DOCUMENT MODE: flat, flowing typography. No card backgrounds.
     Hierarchy comes from rules, whitespace, and type size. Reads as a
     Word-document deliverable, not a website panel. ────────────────── */
  .doc-section{
    margin:3.2rem 0 0;
    padding-top:2.4rem;
    border-top:1px solid var(--rule);
  }
  .doc-section:first-of-type{ border-top:none; padding-top:0; }
  .doc-section-head{ margin-bottom:1.6rem; }
  .doc-eyebrow{
    font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.28em;
    text-transform:uppercase; color:var(--gold); margin-bottom:0.7rem;
  }
  .doc-h2{
    font-family:'Playfair Display',serif; font-size:1.9rem; font-weight:700;
    color:var(--text); line-height:1.2; letter-spacing:-0.005em;
    margin-bottom:0.4rem;
  }
  .doc-h2-sub{
    font-family:'Cormorant Garamond',serif; font-style:italic;
    color:var(--text-dim); font-size:1.05rem; line-height:1.5;
  }

  /* Prose: the body text of any document section. Renders <pre>-style
     preserved whitespace so multi-paragraph EP report content (with
     embedded newlines) flows naturally without manual <br> tags. */
  .doc-prose{
    font-family:'Cormorant Garamond',serif;
    font-size:1.05rem; line-height:1.75;
    color:var(--text);
    white-space:pre-wrap;
    word-wrap:break-word;
    margin:0;
  }

  /* EP article: one per EP report (or per Jules edit group). No card
     background. Separated from siblings by whitespace and a thin top
     rule. The header is a single inline row, not a stacked box. */
  .doc-ep{
    margin-top:2.4rem;
    padding-top:2rem;
    border-top:1px solid var(--rule-soft);
  }
  .doc-ep:first-of-type{ margin-top:1.6rem; padding-top:0; border-top:none; }
  .doc-ep-head{
    display:flex; flex-wrap:wrap; align-items:baseline;
    gap:0.6rem 1.2rem; margin-bottom:0.9rem;
  }
  .doc-ep-name{
    font-family:'Playfair Display',serif; font-size:1.35rem; font-weight:700;
    color:var(--text); line-height:1.2; letter-spacing:-0.005em;
    display:flex; align-items:baseline; gap:0.8rem; flex-wrap:wrap;
  }
  .doc-ep-role{
    font-family:'DM Mono',monospace; font-size:0.58rem; letter-spacing:0.22em;
    text-transform:uppercase; color:var(--gold); font-weight:400;
  }
  .doc-ep-type{
    margin-left:auto;
    font-family:'DM Mono',monospace; font-size:0.55rem; letter-spacing:0.2em;
    text-transform:uppercase; color:var(--text-dim);
    padding:0.3rem 0.6rem; border:1px solid var(--rule);
  }
  .doc-ep-headline{
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:1.15rem; line-height:1.45; color:var(--gold-light);
    margin-bottom:1rem;
  }

  /* Jules edit blocks live inside a doc-ep article when she has any. */
  .doc-edit{ margin-bottom:1.6rem; }
  .doc-edit:last-child{ margin-bottom:0; }
  .doc-edit-meta{
    display:flex; align-items:baseline; gap:0.7rem;
    margin-bottom:0.4rem;
  }
  .doc-edit-op{
    font-family:'DM Mono',monospace; font-size:0.52rem; letter-spacing:0.22em;
    text-transform:uppercase; color:var(--gold); font-weight:500;
  }
  .doc-edit-label{
    font-family:'Cormorant Garamond',serif; font-style:italic;
    color:var(--text-dim); font-size:0.95rem;
  }
  .doc-edit-rationale{
    font-family:'Cormorant Garamond',serif; font-style:italic;
    color:var(--text-dim); font-size:0.95rem; line-height:1.5;
    margin-bottom:0.6rem;
  }

  /* Step indicator */
  .step-bar{
    display:flex;gap:0.5rem;align-items:center;margin-bottom:2rem;
  }
  .step-pip{flex:1;height:3px;background:var(--gold);}
  .step-label{
    font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.24em;
    text-transform:uppercase;color:var(--gold);white-space:nowrap;
  }

  /* Cost anchor - sample-only, hidden under white-label */
  .cost-anchor{
    margin:3rem 0; padding:1.8rem 2rem;
    border:1px solid var(--rule); background:transparent;
    position:relative;
  }
  .cost-anchor::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--gold);
  }
  .cost-anchor-eyebrow{
    font-family:'DM Mono',monospace; font-size:0.55rem; letter-spacing:0.24em;
    text-transform:uppercase; color:var(--gold); margin-bottom:0.8rem;
  }
  .cost-anchor-title{
    font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:700;
    color:var(--cream); line-height:1.2; margin-bottom:0.4rem;
  }
  .cost-anchor-title em{ font-style:italic; color:var(--gold-light); }
  .cost-anchor-sub{
    font-family:'Cormorant Garamond',serif; font-style:italic;
    color:var(--text-dim); font-size:1rem; margin-bottom:1.4rem;
  }
  .cost-list{ list-style:none; padding:0; margin:0 0 1.4rem; }
  .cost-list li{
    display:flex; justify-content:space-between; gap:1.2rem;
    padding:0.55rem 0; border-bottom:1px dotted rgba(184,146,42,0.16);
    font-family:'Cormorant Garamond',serif; font-size:1rem; color:var(--text);
  }
  .cost-list li:last-child{ border-bottom:none; }
  .cost-list-label{ flex:1; }
  .cost-list-range{
    font-family:'DM Mono',monospace; font-size:0.78rem;
    color:var(--gold-light); white-space:nowrap;
  }
  .cost-anchor-totals{
    display:grid; grid-template-columns:1fr 1fr; gap:1.4rem;
    padding-top:1.2rem; border-top:1px solid var(--rule);
  }
  .cost-total{ display:flex; flex-direction:column; gap:0.2rem; }
  .cost-total-label{
    font-family:'DM Mono',monospace; font-size:0.55rem; letter-spacing:0.22em;
    text-transform:uppercase; color:var(--text-dim);
  }
  .cost-total-value{
    font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700;
    color:var(--gold-light);
  }
  .cost-anchor-note{
    margin-top:1.2rem; padding-top:1.2rem; border-top:1px solid var(--rule);
    font-family:'Cormorant Garamond',serif; font-style:italic;
    color:var(--text); font-size:1rem; line-height:1.55;
  }
  .cost-anchor-note strong{
    font-style:normal; color:var(--cream); font-weight:600;
  }
  @media (max-width:600px){
    .cost-anchor{ padding:1.4rem 1.2rem; }
    .cost-anchor-totals{ grid-template-columns:1fr; gap:0.8rem; }
    .cost-list li{ flex-direction:column; gap:0.2rem; }
  }

  /* Brand block - top of the report and footer.
     Clean horizontal header on a white document. No card background -
     just a bottom rule under the top block and a top rule above the
     footer credit. */
  .brand-block{
    background:transparent;border:none;
    border-bottom:1px solid var(--rule);
    padding:0.8rem 0 1.2rem;
    display:flex;align-items:center;gap:1rem;
    margin-bottom:2.4rem;
  }
  .brand-block-top{margin-top:0;}
  .brand-block-footer{
    margin:4rem 0 0;
    border:none;border-top:1px solid var(--rule);
    padding:1.2rem 0 0;
  }
  .brand-mark{
    flex:0 0 auto;width:42px;height:42px;border-radius:50%;
    background:linear-gradient(135deg,var(--gold) 0%, var(--gold-light) 100%);
    color:var(--ink);display:flex;align-items:center;justify-content:center;
    font-family:'Playfair Display',serif;font-weight:700;font-size:1.1rem;
    letter-spacing:0;
    overflow:hidden;
  }
  /* When the mark contains an image (logo / emblem), drop the gold
     gradient so the image itself carries the brand color and stays
     legible. The image fills the circle via object-fit: cover for
     emblem-style logos (Favicon.png is already a circular emblem). */
  .brand-mark:has(img){
    background:transparent;
  }
  .brand-mark img{
    width:100%;height:100%;object-fit:cover;border-radius:50%;
    display:block;
  }
  .brand-text{display:flex;flex-direction:column;gap:0.15rem;flex:1;min-width:0;}
  .brand-name{
    font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;
    color:var(--cream);letter-spacing:0.04em;
  }
  .brand-tagline{
    font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.2em;
    text-transform:uppercase;color:var(--text-dim);
  }
  .brand-credit{
    margin-left:auto;font-family:'DM Mono',monospace;font-size:0.55rem;
    letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);
    white-space:nowrap;
  }
  .brand-block-footer .brand-credit{color:var(--text-dim);}
  @media (max-width:640px){
    .brand-credit{display:none;}
    .brand-block{padding:0.85rem 1rem;}
  }

  /* Header */
  .report-eyebrow{
    font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.28em;
    text-transform:uppercase;color:var(--gold);margin-bottom:0.7rem;
  }
  .report-title{
    font-family:'Playfair Display',serif;font-size:clamp(2.2rem,4.5vw,3.2rem);
    font-weight:700;color:var(--cream);line-height:1.05;
    letter-spacing:-0.01em;margin-bottom:0.8rem;
  }
  .report-title em{font-style:italic;color:var(--gold-light);}
  .report-subline{
    font-family:'Playfair Display',serif;font-style:italic;font-size:1.2rem;
    color:var(--gold-light);margin-bottom:0.8rem;
  }
  .report-meta{
    font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.16em;
    text-transform:uppercase;color:var(--text-dim);
  }

  /* Composite */
  .composite{
    margin:2.5rem 0;
    border:1px solid var(--rule);background:transparent;
    padding:1.8rem 2rem;
    display:grid;grid-template-columns:auto 1fr;gap:1.8rem;align-items:center;
    position:relative;overflow:hidden;
  }
  .composite::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
    background:var(--gold);
  }
  .composite.is-agreement::before{background:var(--gold-light);}
  .composite.is-conflict::before{background:var(--crimson-bright);}
  .composite-number{
    font-family:'Playfair Display',serif;font-size:4rem;font-weight:700;
    color:var(--cream);line-height:1;letter-spacing:-0.02em;
  }
  .composite-number .of{
    font-size:1.4rem;color:var(--text-dim);font-weight:400;
  }
  .composite-info{display:flex;flex-direction:column;gap:0.4rem;}
  .composite-verdict-label{
    font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.24em;
    text-transform:uppercase;color:var(--gold);
  }
  .composite.is-conflict .composite-verdict-label{color:var(--crimson-bright);}
  .composite-verdict{
    font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;
    color:var(--cream);line-height:1.25;
  }
  .composite-spread{
    font-family:'Cormorant Garamond',serif;font-style:italic;
    color:var(--text-dim);font-size:1rem;
  }

  /* Section */
  .section{margin:2.8rem 0 0;}
  .section-eyebrow{
    font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.26em;
    text-transform:uppercase;color:var(--gold);margin-bottom:0.7rem;
  }
  .section-title{
    font-family:'Playfair Display',serif;font-size:1.55rem;font-weight:700;
    color:var(--cream);line-height:1.2;margin-bottom:1.2rem;
  }
  .section-title em{font-style:italic;color:var(--gold-light);}

  /* Findings */
  .findings{display:flex;flex-direction:column;gap:1rem;}
  .finding{
    display:grid;grid-template-columns:88px 1fr auto;gap:1.1rem;
    align-items:start;
    border-top:1px solid var(--rule-soft);background:transparent;
    padding:1.3rem 0;
  }
  .finding:first-child{ border-top:none; padding-top:0.4rem; }
  .finding-portrait{
    width:88px;height:88px;overflow:hidden;
    border:1px solid var(--rule);background:rgba(26,24,22,0.08);
  }
  .finding-portrait img{
    width:100%;height:100%;object-fit:cover;object-position:center top;display:block;
  }
  .finding-body{display:flex;flex-direction:column;gap:0.3rem;}
  .finding-name{
    font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;
    color:var(--cream);line-height:1.2;
  }
  .finding-domain{
    font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.18em;
    text-transform:uppercase;color:var(--gold);margin-bottom:0.4rem;
  }
  .finding-text{
    font-family:'Cormorant Garamond',serif;font-size:1.02rem;line-height:1.6;
    color:var(--text);
  }
  .finding-score{
    text-align:right;
    font-family:'Playfair Display',serif;font-weight:700;
    font-size:1.8rem;color:var(--gold-light);line-height:1;
    padding-top:0.2rem;
  }
  .finding-score .of{font-size:0.85rem;color:var(--text-dim);font-weight:400;}
  .finding-confidence{
    font-family:'DM Mono',monospace;font-size:0.5rem;letter-spacing:0.16em;
    text-transform:uppercase;color:var(--text-dim);margin-top:0.3rem;
  }
  .finding.is-error .finding-text{color:var(--text-dim);font-style:italic;}
  .finding.is-error .finding-score{color:var(--text-dim);}

  /* Routing */
  .routing{
    margin:2.8rem 0 0;
    border-left:3px solid var(--crimson-bright);
    padding:1.4rem 1.6rem;background:rgba(192,57,43,0.06);
  }
  .routing-eyebrow{
    font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.26em;
    text-transform:uppercase;color:var(--crimson-bright);margin-bottom:0.6rem;
  }
  .routing-title{
    font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;
    color:var(--cream);line-height:1.2;margin-bottom:0.7rem;
  }
  .routing-body{
    font-family:'Cormorant Garamond',serif;font-size:1.08rem;line-height:1.65;
    color:var(--text);margin-bottom:1.1rem;
  }
  .routing-cta-row{display:flex;gap:0.8rem;flex-wrap:wrap;}

  /* Actions */
  .actions-row{
    display:flex;gap:1rem;flex-wrap:wrap;
    margin-top:3rem;padding-top:1.8rem;border-top:1px solid var(--rule);
  }
  .btn{
    display:inline-flex;align-items:center;gap:0.5rem;
    padding:0.85rem 1.5rem;
    font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.22em;
    text-transform:uppercase;font-weight:700;text-decoration:none;
    cursor:pointer;border:1px solid transparent;
    transition:background 0.2s,border-color 0.2s,color 0.2s,transform 0.2s;
  }
  .btn-primary{background:var(--gold);color:var(--ink);border-color:var(--gold);}
  .btn-primary:hover{background:var(--gold-light);border-color:var(--gold-light);transform:translateY(-1px);}
  .btn-outline{background:transparent;border-color:var(--gold);color:var(--gold);}
  .btn-outline:hover{background:rgba(184,146,42,0.08);color:var(--gold-light);border-color:var(--gold-light);}

  /* Loading / error */
  .state-card{
    border:1px solid var(--rule);background:rgba(26,24,22,0.045);
    padding:2.5rem 2rem;text-align:center;
  }
  .state-spinner{
    width:48px;height:48px;border-radius:50%;
    border:2px solid rgba(184,146,42,0.25);border-top-color:var(--gold-light);
    margin:0 auto 1.2rem;animation:report-spin 0.9s linear infinite;
  }
  @keyframes report-spin{to{transform:rotate(360deg);}}
  .state-text{
    font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.24em;
    text-transform:uppercase;color:var(--gold-light);
  }
  .state-error .state-text{color:var(--crimson-bright);}

  /* Per-dimension grouping inside the panel section (multi-stage reports). */
  .finding-group{ margin-bottom:1.7rem; }
  .finding-group:last-child{ margin-bottom:0; }
  .finding-group-title{
    font-family:'Playfair Display',serif; font-size:1.35rem; font-weight:700;
    color:var(--gold-light); margin:0 0 0.85rem; line-height:1.25;
    padding-bottom:0.4rem; border-bottom:1px dashed rgba(184,146,42,0.25);
    display:flex; align-items:baseline; gap:0.6rem;
  }
  .dim-chip{
    font-family:'DM Mono',monospace; font-size:0.62rem; letter-spacing:0.14em;
    color:var(--cream);
    padding:0.25rem 0.55rem; border:1px solid var(--rule);
    background:rgba(184,146,42,0.06);
  }

  /* Update the routing recommendation copy to match multi-stage framing. */

  /* ── Deliverable sections (brief + work log) ──────────────────────────
     Sourced from sessionStorage. If absent, the sections do not render
     and the report degrades to the chamber-view it has shipped with. */
  .toc{
    display:flex; gap:0.4rem; flex-wrap:wrap;
    padding:0.65rem 0.9rem; margin:1.4rem 0;
    border:1px solid var(--rule); background:rgba(26,24,22,0.035);
  }
  .toc-label{
    font-family:'DM Mono',monospace; font-size:0.55rem; letter-spacing:0.2em;
    text-transform:uppercase; color:var(--gold);
    align-self:center; margin-right:0.4rem;
  }
  .toc a{
    font-family:'DM Mono',monospace; font-size:0.55rem; letter-spacing:0.16em;
    text-transform:uppercase; color:var(--gold-light);
    padding:0.3rem 0.55rem; border:1px solid var(--rule);
    text-decoration:none;
    transition:all 0.18s;
  }
  .toc a:hover{ color:var(--ink); background:var(--gold-light); border-color:var(--gold-light); }

  .deliverable{
    margin:2.5rem 0;
    border-top:1px solid var(--rule); border-bottom:1px solid var(--rule);
    padding:2rem 0;
  }
  .deliverable-eyebrow{
    font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:0.28em;
    text-transform:uppercase; color:var(--gold);
    margin-bottom:0.7rem;
  }
  .deliverable-title{
    font-family:'Playfair Display',serif; font-size:2rem; font-weight:700;
    color:var(--cream); line-height:1.2; margin-bottom:0.5rem;
  }
  .deliverable-title em{ font-style:italic; color:var(--gold-light); }
  .deliverable-sub{
    font-family:'Cormorant Garamond',serif; font-style:italic;
    color:var(--text-dim); font-size:1rem; line-height:1.55;
    margin-bottom:1.6rem;
  }

  /* The brief itself - the full working document */
  .brief-block{
    border:1px solid var(--rule); background:rgba(26,24,22,0.04);
    padding:1.3rem 1.5rem;
    margin-bottom:1.6rem;
  }
  .brief-block-head{
    display:flex; align-items:baseline; gap:0.6rem;
    margin-bottom:0.9rem; padding-bottom:0.65rem;
    border-bottom:1px solid var(--rule);
  }
  .brief-block-head h3{
    font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700;
    color:var(--cream); margin:0;
  }
  .brief-block-note{
    font-family:'DM Mono',monospace; font-size:0.5rem; letter-spacing:0.18em;
    text-transform:uppercase; color:var(--text-dim);
    margin-left:auto;
  }
  .brief-text{
    font-family:'Cormorant Garamond',serif; font-size:1rem; line-height:1.65;
    color:var(--text);
    white-space:pre-wrap; word-wrap:break-word;
    max-height:560px; overflow-y:auto;
    padding-right:0.5rem;
  }

  /* The work log - what the EPs produced. Native <details> for collapse. */
  .work-block summary{
    cursor:pointer; list-style:none;
    display:flex; align-items:center; gap:0.55rem;
    padding:0.8rem 1rem;
    background:rgba(184,146,42,0.04); border:1px solid var(--rule);
    border-left:3px solid var(--gold);
    transition:all 0.18s;
  }
  .work-block summary::-webkit-details-marker{ display:none; }
  .work-block summary:hover{ background:rgba(184,146,42,0.08); }
  .work-ep[open] summary{ background:rgba(184,146,42,0.07); border-bottom-color:transparent; }
  .work-ep{ margin-bottom:0.5rem; }
  .work-ep-name{
    font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:700;
    color:var(--cream); line-height:1.2;
  }
  .work-ep-role{
    font-family:'DM Mono',monospace; font-size:0.55rem; letter-spacing:0.16em;
    text-transform:uppercase; color:var(--gold-light);
    margin-left:0.6rem;
  }
  .work-ep-count{
    font-family:'DM Mono',monospace; font-size:0.55rem; letter-spacing:0.16em;
    text-transform:uppercase; color:var(--gold);
    margin-left:auto;
    padding:0.2rem 0.5rem; border:1px solid var(--rule);
  }
  .work-ep-disclose{
    font-family:'DM Mono',monospace; font-size:0.7rem;
    color:var(--gold-light); margin-left:0.5rem;
  }
  .work-ep[open] .work-ep-disclose{ transform:rotate(90deg); display:inline-block; }
  .work-ep-body{
    border:1px solid var(--rule); border-top:none;
    padding:0.85rem 1rem 1rem;
    display:flex; flex-direction:column; gap:0.7rem;
  }
  .work-rev{
    padding:0.7rem 0.85rem;
    background:rgba(26,24,22,0.03); border-left:2px solid var(--gold-light);
  }
  .work-rev-head{
    display:flex; align-items:baseline; gap:0.5rem; flex-wrap:wrap;
    margin-bottom:0.4rem;
  }
  .work-rev-op{
    font-family:'DM Mono',monospace; font-size:0.5rem; letter-spacing:0.18em;
    text-transform:uppercase; color:var(--gold);
    padding:0.2rem 0.5rem; border:1px solid var(--rule);
  }
  .work-rev-label{
    font-family:'Playfair Display',serif; font-size:0.98rem; font-weight:700;
    color:var(--cream); line-height:1.3;
    flex:1; min-width:0;
  }
  .work-rev-rationale{
    font-family:'Cormorant Garamond',serif; font-style:italic;
    color:var(--text-dim); font-size:0.9rem; line-height:1.5;
    margin-bottom:0.5rem;
  }
  .work-rev-content{
    font-family:'Cormorant Garamond',serif; font-size:0.95rem; line-height:1.55;
    color:var(--text);
    white-space:pre-wrap; word-wrap:break-word;
    max-height:340px; overflow-y:auto;
    padding:0.55rem 0.7rem;
    background:rgba(184,146,42,0.04); border-left:2px solid var(--rule);
  }

  @media (max-width:640px){
    main{padding:2.5rem 1.3rem 4rem;}
    .tg-topbar{padding:0 1.3rem;}
    .composite{grid-template-columns:1fr;gap:1rem;}
    .composite-number{font-size:3rem;}
    .finding{grid-template-columns:64px 1fr;}
    .finding-portrait{width:64px;height:64px;}
    .finding-score{grid-column:1 / -1;text-align:left;font-size:1.4rem;padding-top:0;}
    .toc{ flex-direction:column; align-items:flex-start; }
    .toc-label{ margin-bottom:0.3rem; }
    .brief-block-head{ flex-direction:column; align-items:flex-start; gap:0.3rem; }
    .brief-block-note{ margin-left:0; }
  }

  /* ── Sample watermark: visible only when printing in sample mode ──
     The element exists in the DOM as part of the report (see
     renderReport) but is display:none on screen. The @media print
     block below shows it as a fixed diagonal overlay on every page. */
  .print-watermark{ display:none; }

  /* ── PRINT STYLESHEET ─────────────────────────────────────────────
     Triggered when the visitor hits "Export PDF ↓" (which calls
     window.print()) or uses native browser print. Strips screen-only
     chrome (topbar, TOC, action buttons), forces detail panels open
     so all EP reports print in full, preserves the brand dark theme
     via print-color-adjust, and renders a diagonal SAMPLE watermark
     when the document carries data-tg-mode="sample".
  ──────────────────────────────────────────────────────────────────── */
  @media print {
    /* Page setup. Letter size; reasonable margins for branded headers
       and the SAMPLE watermark to sit inside the page box. */
    @page{
      size:letter;
      margin:0.55in 0.5in 0.6in;
    }

    /* Preserve the dark theme's colors and backgrounds in the printed
       PDF. Without this, browsers strip backgrounds for ink savings. */
    *, *::before, *::after{
      -webkit-print-color-adjust:exact !important;
      print-color-adjust:exact !important;
      color-adjust:exact !important;
    }

    html, body{
      background:var(--bg) !important;
      color:var(--text) !important;
    }
    body{
      background-image:none !important;
    }

    /* Strip screen-only nav chrome. The PDF is the artifact; the
       navigation is the workshop floor. */
    .tg-topbar,
    .toc,
    .actions-row,
    .report-eyebrow{
      display:none !important;
    }

    /* Tighten main padding for print. */
    main{
      max-width:none !important;
      padding:0 !important;
    }

    /* Force every <details> open in print so EP reports and copy edits
       render in full. The screen view collapses them by default. */
    details[open] > summary,
    details > summary{
      display:list-item;
    }
    details{
      page-break-inside:avoid;
    }
    details:not([open]) > *:not(summary){
      display:revert !important;
    }
    details > summary{
      list-style:none;
      cursor:default;
    }
    .work-ep-disclose{ display:none !important; }

    /* Page-break controls. Keep key blocks intact across page breaks. */
    .composite,
    .finding,
    .finding-group,
    .work-ep,
    .brief-block,
    .work-rev,
    .cost-anchor{
      page-break-inside:avoid;
      break-inside:avoid;
    }

    /* Major sections start on the next clean position (no forced page
       break - just avoid awkward orphan headings). */
    .section,
    .deliverable,
    #next,
    .cost-anchor{
      page-break-before:auto;
    }
    .section-title,
    .deliverable-title,
    .brand-block,
    h1, h2, h3{
      page-break-after:avoid;
    }

    /* Brand block: shrink for print but keep the colored mark. */
    .brand-block{
      padding:0.6rem 0.9rem !important;
      margin-bottom:1rem !important;
    }
    .brand-block-footer{
      margin:2rem 0 0 !important;
    }

    /* Headlines: scale down slightly for print, keep weight + color. */
    .report-title{
      font-size:2.2rem !important;
      margin-bottom:0.5rem !important;
    }
    .composite{
      margin:1.4rem 0 !important;
      padding:1.2rem 1.3rem !important;
    }
    .composite-number{
      font-size:2.4rem !important;
    }

    /* Finding cards: print compactly but readable. */
    .finding{
      padding:0.7rem 0.9rem !important;
      margin-bottom:0.55rem !important;
    }
    .finding-portrait img{ filter:grayscale(0.3); }

    /* Cost anchor lines tighten on print. */
    .cost-list li{
      padding:0.35rem 0 !important;
    }

    /* Hyperlinks: keep the look but flatten interactive styling. */
    a{ text-decoration:none !important; color:inherit !important; }

    /* ── The watermark itself: shown only on samples in print.
       Tuned for a light-paper background - the gold needs more
       saturation to read against cream. ── */
    body[data-tg-mode="sample"] .print-watermark{
      display:block !important;
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%) rotate(-32deg);
      font-family:'Playfair Display', serif;
      font-weight:700;
      font-size:7rem;
      letter-spacing:0.18em;
      color:rgba(138,110,29,0.22);
      text-transform:uppercase;
      white-space:nowrap;
      pointer-events:none;
      z-index:9999;
    }
  }

  /* ── Sample watermark on SCREEN view ────────────────────────────────
     Now that the deliverable reads as a white document, show a faint
     diagonal SAMPLE watermark on screen too (for samples only). The
     visitor sees immediately that this is a preview, not a paid run.
     Hidden under any white-label override (the white-label tier
     doesn't carry the Gauntlet sample message). */
  body[data-tg-mode="sample"]:not([data-tg-whitelabel]) main::after{
    content:'PREVIEW SAMPLE';
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%) rotate(-32deg);
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size:clamp(4rem, 11vw, 9rem);
    letter-spacing:0.18em;
    color:rgba(138,110,29,0.1);
    text-transform:uppercase;
    white-space:nowrap;
    pointer-events:none;
    z-index:5;
  }
</style>

<body>

<header class="tg-topbar">
  <a class="tg-topbar-logo" href="/">
    <img src="Favicon.png" alt="" aria-hidden="true">
    THE GAUNTLET
  </a>
  <a class="tg-topbar-back" href="/">← Home</a>
</header>

<main>
  <div class="step-bar">
    <div class="step-pip"></div>
    <div class="step-pip"></div>
    <div class="step-pip"></div>
    <span class="step-label">Done</span>
  </div>

  <div id="report-content">
    <div class="state-card" id="state-loading">
      <div class="state-spinner" aria-hidden="true"></div>
      <div class="state-text">Loading your routing report</div>
    </div>
  </div>
</main>

<script>
(function(){
  'use strict';

  const ENDPOINT      = '/.netlify/functions/tg-evaluation-get';
  const JUDGES_CONFIG = '/config/judges_master.json';

  // Brief + revisions live in sessionStorage (per-tab). DB submission text
  // is intentionally NOT exposed by the evaluation-get function; the brief
  // belongs to the visitor and we honor that. If sessionStorage is empty
  // (cross-tab / later-session visitor), the brief and work sections
  // gracefully omit and the report degrades to the chamber-view findings.
  const KEY_BRIEF     = 'tg_visitor_brief';
  const KEY_REVISIONS = 'tg_ep_revisions';

  // EP display labels for the work log section. id matches the values
  // tg-ep-chat.js + the per-EP hub clients write into the revision log.
  const EP_DISPLAY = {
    ms_ivy:        { name: 'Ms. Ivy',        role: 'The Librarian' },
    wren_calloway: { name: 'Wren Calloway',  role: 'The Scout' },
    carol_haynes:  { name: 'Carol Haynes',   role: 'The Screener' },
    matthew_vance: { name: 'Matthew Vance',  role: 'The Behaviorist' },
    arjun_mehta:   { name: 'Arjun Mehta',    role: 'The Make-It-Real Expert' },
    zara_cole:     { name: 'Zara Cole',      role: 'The Influencer' },
    reid_callum:   { name: 'Reid Callum',    role: 'The Marketing Expert' },
    jules:         { name: 'Jules',          role: 'The Rewrite Partner' },
    grant_ellis:   { name: 'Grant Ellis',    role: 'The Coach' },
  };

  const root = document.getElementById('report-content');

  function ss(k){ try { return sessionStorage.getItem(k); } catch(_) { return null; } }
  function ssJson(k, fallback){
    const raw = ss(k);
    if (!raw) return fallback;
    try { return JSON.parse(raw); } catch(_) { return fallback; }
  }

  function escapeHtml(s){
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // Image filenames use first name only; titles stripped.
  function imageFirstName(fullName){
    const titles = new Set(['Dr.','Admiral','Mr.','Ms.','Mrs.','Prof.']);
    const parts = String(fullName || '').split(/\s+/);
    for (const p of parts){ if (!titles.has(p)) return p; }
    return parts[0] || '';
  }

  // Routing recommendation. Pure function over the triangulation result +
  // composite score. This is the slice 1 rubric - one helper per verdict
  // / score band. The full rubric (multi-dimension, multi-helper paths)
  // is a downstream slice once more dimensions ship.
  function buildRoutingRecommendation(triangulation, findings){
    if (!triangulation){
      return {
        title: 'No verdict yet.',
        body:  'The panel did not return a triangulation. Try running the evaluation again, or ask the helpers for feedback before resubmitting.',
        helper: null,
      };
    }
    const composite10 = Math.round((triangulation.composite_score || 0) * 100) / 10;
    const verdict = triangulation.verdict
      || (triangulation.agreement_dimensions && triangulation.agreement_dimensions.length && !(triangulation.conflict_dimensions && triangulation.conflict_dimensions.length) ? 'agreement'
      :  triangulation.conflict_dimensions && triangulation.conflict_dimensions.length ? 'conflict'
      :  'middle');

    if (verdict === 'agreement' && composite10 >= 7){
      return {
        title:  'Clarity is solid. Move on to the next dimension.',
        body:   'The panel agrees: your idea is clearly expressed. The next dimension (Novelty, Feasibility) is what we evaluate next when those slices ship.',
        helper: null,
      };
    }
    if (verdict === 'agreement' && composite10 <= 4){
      return {
        title:  'Clear panel agreement. Your idea is not clearly expressed yet.',
        body:   'The judges are aligned: the description does not yet make the problem, the solution, and the audience explicit. Visit Jules in The Wings to tighten the language before resubmitting.',
        helper: { id: 'jules', name: 'Jules', role: 'The Rewrite Partner', href: '/Helpers/jules-rewrite.html' },
      };
    }
    if (verdict === 'conflict'){
      return {
        title:  'The judges disagree on what your idea is.',
        body:   'A wide spread on Clarity usually means an ambiguity in how the idea is framed - different judges are reading different things. Visit Carol in The Wings; she will tell you what is strong and what is missing before you face the panel again.',
        helper: { id: 'carol_haynes', name: 'Carol Haynes', role: 'The Screener', href: '/Helpers/carol-screener.html' },
      };
    }
    // Middle ground: mixed clarity. Default to Jules for language tightening.
    return {
      title:  'Mixed clarity. Tighten before the next round.',
      body:   'The panel is neither aligned nor split. The idea reads as partially clear. Visit Jules in The Wings to sharpen the language, or Reid for positioning, then resubmit.',
      helper: { id: 'jules', name: 'Jules', role: 'The Rewrite Partner', href: '/Helpers/jules-rewrite.html' },
    };
  }

  function formatVerdictLabel(verdict){
    if (verdict === 'agreement') return 'Panel agreement';
    if (verdict === 'conflict')  return 'Panel split';
    return 'Panel mixed';
  }

  // Display label for a dimension key.
  const DIMENSION_LABELS = {
    clarity:    'Clarity',
    viability:  'Viability',
    risk:       'Risk',
    narrative:  'Narrative',
    evidence:   'Evidence',
    cultural:   'Cultural',
    psych:      'Psych',
    compliance: 'Compliance',
    structure:  'Structure',
  };
  function dimensionLabel(dim){ return DIMENSION_LABELS[dim] || String(dim || '').replace(/^\w/, c => c.toUpperCase()); }

  // Spread summary across all dimensions present in the matrix.
  function formatSpreadAll(matrix){
    if (!matrix || typeof matrix !== 'object') return '';
    const keys = Object.keys(matrix);
    if (!keys.length) return '';
    const allScores = [];
    keys.forEach(k => Object.values(matrix[k] || {}).forEach(s => { if (typeof s === 'number') allScores.push(s); }));
    if (!allScores.length) return '';
    const min = Math.min(...allScores);
    const max = Math.max(...allScores);
    if (min === max) return `Every judge, every dimension scored ${min}.`;
    return `Scores ranged ${min} to ${max} across ${keys.length} dimension${keys.length === 1 ? '' : 's'}.`;
  }

  // Group revisions by EP id, in the order EPs first appear in the log.
  function groupRevisionsByEp(revisions){
    const order = [];
    const groups = {};
    (revisions || []).forEach(r => {
      if (!r || !r.ep_id) return;
      if (!groups[r.ep_id]) { groups[r.ep_id] = []; order.push(r.ep_id); }
      groups[r.ep_id].push(r);
    });
    return order.map(id => ({ ep_id: id, revisions: groups[id] }));
  }

  function renderBriefSection(brief){
    if (!brief || brief.length < 12) return '';
    return `
      <section class="doc-section" id="brief">
        <header class="doc-section-head">
          <div class="doc-eyebrow">Your Brief</div>
          <h2 class="doc-h2">The idea, as written.</h2>
        </header>
        <div class="doc-prose">${escapeHtml(brief)}</div>
      </section>
    `;
  }

  // Cost anchor: honest breakdown of what a comparable deliverable would cost
  // from professionals. Shown ONLY on sample deliverables with no white-label
  // override - hidden on live (paid) reports and on any deliverable carrying a
  // brand_config (white-labeled samples don't sell The Gauntlet).
  const COST_LINES = [
    { label: 'Buyer-psychology profile',                                           range: '$300–$1,500' },
    { label: 'Landscape / category audit',                                         range: '$500–$3,000' },
    { label: 'Pattern-screening with comp validation',                             range: '$200–$1,500' },
    { label: 'Press release (PR agency or freelance copywriter)',                  range: '$150–$2,500' },
    { label: '45-day content plan (social strategist)',                            range: '$500–$3,000' },
    { label: 'Research-and-frameworks memo',                                       range: '$300–$1,500' },
    { label: 'Operations / regulatory read (fractional COO or consultant)',        range: '$500–$2,500' },
    { label: 'Coaching / presenter prep session',                                  range: '$300–$1,500' },
    { label: 'Panel critique (24 findings, 3 reviewers - advisory-board equivalent)', range: '$500–$3,000' }
  ];
  function shouldShowCostAnchor(data){
    if (!data || !data.sample_id) return false;
    if (data.brand_config) return false; // white-labeled samples don't show it
    if (ssJson('tg_brand_config', null)) return false; // session white-label too
    return true;
  }
  function renderCostAnchor(data){
    if (!shouldShowCostAnchor(data)) return '';
    const linesHtml = COST_LINES.map(l => `
      <li>
        <span class="cost-list-label">${escapeHtml(l.label)}</span>
        <span class="cost-list-range">${escapeHtml(l.range)}</span>
      </li>
    `).join('');
    return `
      <section class="cost-anchor" id="value">
        <div class="cost-anchor-eyebrow">What this would cost from professionals</div>
        <h2 class="cost-anchor-title">The honest <em>math</em>.</h2>
        <p class="cost-anchor-sub">Real freelance and boutique-consultant rates for the line items in this deliverable.</p>
        <ul class="cost-list">${linesHtml}</ul>
        <div class="cost-anchor-totals">
          <div class="cost-total">
            <span class="cost-total-label">Floor (low-end freelance)</span>
            <span class="cost-total-value">~$3,250</span>
          </div>
          <div class="cost-total">
            <span class="cost-total-label">Mid-range (boutique)</span>
            <span class="cost-total-value">$8,000–$15,000</span>
          </div>
        </div>
        <p class="cost-anchor-note">
          <strong>And nobody at any price tier writes all eight reports plus the panel triangulation in one integrated artifact.</strong> You'd hire 3-5 specialists who wouldn't talk to each other. The Gauntlet integrates them. That's why this exists - and why the founders who need it most can finally afford it.
        </p>
      </section>
    `;
  }

  // Brand block: resolves brand_config from (1) deliverable JSON, (2) session
  // override, (3) default. Default is The Gauntlet; higher-tier users can
  // set sessionStorage.tg_brand_config to white-label their deliverables.
  const DEFAULT_BRAND = {
    brand_name: 'The Gauntlet',
    tagline: 'AI-paneled idea evaluation',
    initials: 'TG',
    logo_url: '/Favicon.png',
    credit: 'Generated by The Gauntlet',
    footer_credit: 'Powered by The Gauntlet'
  };
  function resolveBrand(data){
    // Priority: deliverable embedded brand > session white-label > default
    const embedded = data && data.brand_config && typeof data.brand_config === 'object'
      ? data.brand_config : null;
    const session = ssJson('tg_brand_config', null);
    const merged = Object.assign({}, DEFAULT_BRAND, session || {}, embedded || {});
    // Derive initials if not provided
    if (!merged.initials && merged.brand_name) {
      merged.initials = merged.brand_name
        .split(/\s+/).filter(Boolean).slice(0,2)
        .map(w => w[0]).join('').toUpperCase() || 'TG';
    }
    return merged;
  }
  function renderBrandBlock(brand, position){
    const isFooter = position === 'footer';
    const cls = isFooter ? 'brand-block brand-block-footer' : 'brand-block brand-block-top';
    const mark = brand.logo_url
      ? `<div class="brand-mark"><img src="${escapeHtml(brand.logo_url)}" alt=""></div>`
      : `<div class="brand-mark">${escapeHtml(brand.initials)}</div>`;
    const credit = isFooter
      ? (brand.footer_credit || brand.credit || '')
      : (brand.credit || '');
    return `
      <div class="${cls}">
        ${mark}
        <div class="brand-text">
          <div class="brand-name">${escapeHtml(brand.brand_name)}</div>
          ${brand.tagline ? `<div class="brand-tagline">${escapeHtml(brand.tagline)}</div>` : ''}
        </div>
        ${credit ? `<div class="brand-credit">${escapeHtml(credit)}</div>` : ''}
      </div>
    `;
  }

  // EP reports: each non-Jules EP produces a discrete report on the brief.
  // Rendered as an expandable card per EP, content shown in full.
  function renderEpReportsSection(epReports){
    const list = Array.isArray(epReports) ? epReports.filter(r => r && r.ep_id) : [];
    if (!list.length) return '';
    const articlesHtml = list.map(r => {
      const ep = EP_DISPLAY[r.ep_id] || { name: r.ep_id, role: '' };
      const reportType = r.report_type || 'Report';
      const headline = r.headline
        ? `<p class="doc-ep-headline">${escapeHtml(r.headline)}</p>` : '';
      const content  = r.content
        ? `<div class="doc-prose">${escapeHtml(r.content)}</div>` : '';
      return `
        <article class="doc-ep">
          <header class="doc-ep-head">
            <h3 class="doc-ep-name">${escapeHtml(ep.name)}<span class="doc-ep-role">${escapeHtml(ep.role)}</span></h3>
            <div class="doc-ep-type">${escapeHtml(reportType)}</div>
          </header>
          ${headline}
          ${content}
        </article>
      `;
    }).join('');

    return `
      <section class="doc-section" id="reports">
        <header class="doc-section-head">
          <div class="doc-eyebrow">EP Reports</div>
          <h2 class="doc-h2">${list.length} EP${list.length === 1 ? '' : 's'}. ${list.length} report${list.length === 1 ? '' : 's'}. One per discipline.</h2>
          <p class="doc-h2-sub">Each EP looked at the brief through their own lens and produced a report.</p>
        </header>
        ${articlesHtml}
      </section>
    `;
  }

  // Jules-only revisions: copy edits to the brief itself. Kept separate
  // from EP reports because revising is Jules's job; the other EPs report.
  function renderWorkSection(revisions){
    const groups = groupRevisionsByEp(revisions);
    if (!groups.length) return '';
    const totalRevs = groups.reduce((sum, g) => sum + g.revisions.length, 0);
    const articlesHtml = groups.map(g => {
      const ep = EP_DISPLAY[g.ep_id] || { name: g.ep_id, role: '' };
      const revsHtml = g.revisions.map(r => {
        const op = String(r.operation || '').toLowerCase();
        const opLabel = op === 'replace' ? 'rewrite' : op === 'append' ? 'addition' : op;
        return `
          <div class="doc-edit">
            <div class="doc-edit-meta">
              <span class="doc-edit-op">${escapeHtml(opLabel)}</span>
              <span class="doc-edit-label">${escapeHtml(r.section_label || 'section')}</span>
            </div>
            ${r.rationale ? `<p class="doc-edit-rationale">${escapeHtml(r.rationale)}</p>` : ''}
            ${r.after ? `<div class="doc-prose">${escapeHtml(r.after)}</div>` : ''}
          </div>
        `;
      }).join('');
      return `
        <article class="doc-ep">
          <header class="doc-ep-head">
            <h3 class="doc-ep-name">${escapeHtml(ep.name)}<span class="doc-ep-role">${escapeHtml(ep.role)}</span></h3>
            <div class="doc-ep-type">${g.revisions.length} ${g.revisions.length === 1 ? 'edit' : 'edits'}</div>
          </header>
          ${revsHtml}
        </article>
      `;
    }).join('');

    return `
      <section class="doc-section" id="work">
        <header class="doc-section-head">
          <div class="doc-eyebrow">Copy Edits</div>
          <h2 class="doc-h2">${totalRevs} ${totalRevs === 1 ? 'edit' : 'edits'} from Jules.</h2>
          <p class="doc-h2-sub">Jules is the only EP who edits the brief itself. The rest report; she rewrites.</p>
        </header>
        ${articlesHtml}
      </section>
    `;
  }

  function renderReport(data, judgesById){
    const evalRow      = data.evaluation;
    const subRow       = data.submission || {};
    const judgeOutputs = data.judge_outputs || [];
    const tri          = data.triangulation;

    const composite10 = tri ? (Math.round((tri.composite_score || 0) * 100) / 10) : null;
    const verdict = tri ? (
      (tri.agreement_dimensions || []).length && !(tri.conflict_dimensions || []).length ? 'agreement'
      : (tri.conflict_dimensions || []).length ? 'conflict'
      : 'middle'
    ) : null;

    // Discover which dimensions are present in this evaluation. Each
    // judge_output row has a `stage` (the dimension) and a dimension_scores
    // map (typically { <dim>: <int> }). Group outputs by dimension in the
    // order dimensions first appear.
    const dimensionsPresent = [];
    const outputsByDimension = {};
    judgeOutputs.forEach(o => {
      // Prefer the row's stage field; fall back to any key in dimension_scores.
      let dim = String(o.stage || '').toLowerCase();
      if (!dim && o.dimension_scores) {
        const k = Object.keys(o.dimension_scores)[0];
        if (k) dim = String(k).toLowerCase();
      }
      if (!dim) return;
      if (!outputsByDimension[dim]) {
        outputsByDimension[dim] = [];
        dimensionsPresent.push(dim);
      }
      outputsByDimension[dim].push(o);
    });
    const dimCount = dimensionsPresent.length;
    const compositeContext = dimCount === 0 ? 'no dimensions yet'
                          : dimCount === 1 ? `on ${dimensionLabel(dimensionsPresent[0])}`
                          : `across ${dimCount} dimensions`;

    const compositeBlock = tri ? `
      <div class="composite is-${verdict}">
        <div class="composite-number">${composite10}<span class="of">/10</span></div>
        <div class="composite-info">
          <div class="composite-verdict-label">${escapeHtml(formatVerdictLabel(verdict))} ${escapeHtml(compositeContext)}</div>
          <div class="composite-verdict">${verdict === 'agreement' ? 'The room reads it the same way.'
                                       : verdict === 'conflict'  ? 'The room reads it differently.'
                                       : 'The room is partially aligned.'}</div>
          <div class="composite-spread">${escapeHtml(formatSpreadAll(tri.matrix))}</div>
        </div>
      </div>` : '';

    // Per-dimension finding blocks. Each block shows the dimension name +
    // the 3 judge cards for that dimension. Order = dimensions first
    // appearance in the judge_outputs array (server returns in insert
    // order, so this respects the chamber's stage sequence).
    const findingBlocks = dimensionsPresent.map(dim => {
      const cards = outputsByDimension[dim].map(o => {
        const j = judgesById[o.judge_id] || { name: o.judge_id, domain: '' };
        const firstName = imageFirstName(j.name);
        const score = (o.dimension_scores && (o.dimension_scores[dim] ?? o.dimension_scores[dimensionLabel(dim)])) ?? null;
        const conf  = Math.round((o.confidence || 0) * 100);
        return `
          <div class="finding ${score == null ? 'is-error' : ''}">
            <div class="finding-portrait">
              <img src="Judges/${escapeHtml(firstName)}_eyes_open.jpg" alt="${escapeHtml(j.name)}"
                   onerror="this.style.display='none'">
            </div>
            <div class="finding-body">
              <div class="finding-name">${escapeHtml(j.name)}</div>
              <div class="finding-domain">${escapeHtml(j.domain || '')}</div>
              <p class="finding-text">${escapeHtml(o.stage_critique || '')}</p>
            </div>
            <div class="finding-score">
              ${score == null ? '—' : score + '<span class="of">/10</span>'}
              <div class="finding-confidence">Conf ${conf}%</div>
            </div>
          </div>
        `;
      }).join('');
      const dimMatrix = (tri && tri.matrix && tri.matrix[dim]) || {};
      const dimScores = Object.values(dimMatrix).filter(s => typeof s === 'number');
      const dimMean = dimScores.length ? Math.round((dimScores.reduce((a,b)=>a+b,0)/dimScores.length) * 10) / 10 : null;
      const dimChip = dimMean != null ? ` <span class="dim-chip">${dimMean}/10</span>` : '';
      return `
        <div class="finding-group">
          <h3 class="finding-group-title">${escapeHtml(dimensionLabel(dim))}${dimChip}</h3>
          <div class="findings">${cards}</div>
        </div>
      `;
    }).join('');

    // Section title scales by dimension count.
    const panelTitle = dimCount === 1
      ? 'Three judges. <em>One dimension.</em>'
      : `Three judges. <em>${dimCount} dimensions.</em>`;

    const routing = buildRoutingRecommendation(tri ? { ...tri, verdict } : null, judgeOutputs);
    const routingBlock = `
      <div class="routing">
        <div class="routing-eyebrow">What to do next</div>
        <h3 class="routing-title">${escapeHtml(routing.title)}</h3>
        <p class="routing-body">${escapeHtml(routing.body)}</p>
        <div class="routing-cta-row">
          ${routing.helper ? `<a class="btn btn-primary" href="${escapeHtml(routing.helper.href)}">Visit ${escapeHtml(routing.helper.name)} (${escapeHtml(routing.helper.role)}) →</a>` : ''}
          <a class="btn btn-outline" href="/intake.html">Bring another idea →</a>
        </div>
      </div>
    `;

    const submissionTitle = (subRow.title || '').trim() || 'your submission';
    const completedAt = evalRow.completed_at ? new Date(evalRow.completed_at).toLocaleString() : '';
    // Pull the visitor name (saved by the welcome modal) so the report
    // header addresses them directly. Falls back to a generic header if
    // they came through without personalizing.
    let visitorName = '';
    try { visitorName = (sessionStorage.getItem('tg_visitor_name') || '').trim(); } catch(_){}
    const headlineTitle = visitorName
      ? `${escapeHtml(visitorName)}, your idea has been <em>tested</em>.`
      : `Your idea has been <em>tested</em>.`;

    // Pull brief + revisions. In sample mode (data.brief / data.revisions
    // present in the payload), the deliverable comes pre-populated from
    // the static JSON. In live mode, fall back to sessionStorage where
    // the visitor's working brief + revision log live.
    const sampleBrief     = typeof data.brief === 'string' ? data.brief.trim() : '';
    const sampleRevisions = Array.isArray(data.revisions) ? data.revisions : null;
    const sampleEpReports = Array.isArray(data.ep_reports) ? data.ep_reports : null;
    const sessionBrief     = sampleBrief || (ss(KEY_BRIEF) || '').trim();
    const sessionRevisions = sampleRevisions || ssJson(KEY_REVISIONS, []);
    const epReportsList    = sampleEpReports || [];
    const briefSection     = renderBriefSection(sessionBrief);
    const epReportsSection = renderEpReportsSection(epReportsList);
    const workSection      = renderWorkSection(sessionRevisions);

    // Build the table-of-contents based on which sections will render.
    // Order matches the on-page order: verdict > deliverable (brief,
    // reports, edits) > panel > next > value. EP reports lead the
    // deliverable so the visitor sees the work the EPs produced first;
    // the panel commentary follows because it critiques that work.
    const tocItems = [
      { id: 'verdict',     label: 'Verdict' },
    ];
    if (briefSection)     tocItems.push({ id: 'brief',     label: 'Brief' });
    if (epReportsSection) tocItems.push({ id: 'reports',   label: 'EP Reports' });
    if (workSection)      tocItems.push({ id: 'work',      label: 'Copy Edits' });
    tocItems.push({ id: 'panel', label: 'Panel' });
    tocItems.push({ id: 'next', label: 'Next' });
    if (shouldShowCostAnchor(data)) tocItems.push({ id: 'value', label: 'Value' });
    const tocBlock = `
      <div class="toc">
        <span class="toc-label">Jump to</span>
        ${tocItems.map(t => `<a href="#${escapeHtml(t.id)}">${escapeHtml(t.label)}</a>`).join('')}
      </div>
    `;

    // Brief, EP reports, and Jules's edits each render as standalone
    // document sections. Each section provides its own id anchor and
    // its own header so the TOC links land on the section header. No
    // wrapper card around them - flat document flow.
    const deliverableBlock = [briefSection, epReportsSection, workSection]
      .filter(Boolean).join('');

    const brand = resolveBrand(data);
    const brandTop    = renderBrandBlock(brand, 'top');
    const brandFooter = renderBrandBlock(brand, 'footer');
    const costAnchor  = renderCostAnchor(data);

    // Tag the document for sample-mode so the print stylesheet (and the
    // on-screen watermark, now that the deliverable reads as a white
    // document) can render a SAMPLE overlay across every printed page
    // and behind the screen content. A white-label override drops the
    // sample-mode watermark on screen (the white-label tier owns the
    // surface and doesn't carry the Gauntlet sample story).
    if (data.sample_id) {
      document.body.setAttribute('data-tg-mode', 'sample');
      document.body.setAttribute('data-tg-sample-title', String(submissionTitle || ''));
    } else {
      document.body.removeAttribute('data-tg-mode');
      document.body.removeAttribute('data-tg-sample-title');
    }
    if (data.brand_config) {
      document.body.setAttribute('data-tg-whitelabel', '');
    } else {
      document.body.removeAttribute('data-tg-whitelabel');
    }

    root.innerHTML = `
      ${brandTop}

      <div class="report-eyebrow">Routing Report</div>
      <h1 class="report-title">${headlineTitle}</h1>
      <p class="report-subline">"${escapeHtml(submissionTitle)}"</p>
      <div class="report-meta">${dimCount === 0 ? 'No dimensions scored' : dimensionsPresent.map(dimensionLabel).join(' &middot; ')} &middot; ${data.sample_id ? 'Sample Deliverable' : ('Evaluation ' + escapeHtml(String(evalRow.id || '').slice(0, 8)))}${completedAt ? ' &middot; ' + escapeHtml(completedAt) : ''}</div>

      ${tocBlock}

      ${compositeBlock.replace('<div class="composite ', '<div id="verdict" class="composite ')}

      ${deliverableBlock}

      <section class="section" id="panel">
        <div class="section-eyebrow">What the panel said</div>
        <h2 class="section-title">${panelTitle}</h2>
        ${findingBlocks}
      </section>

      <div id="next">${routingBlock}</div>

      ${costAnchor}

      <div class="actions-row">
        <button type="button" class="btn btn-primary" data-tg-export>Export brief ↓</button>
        <button type="button" class="btn btn-primary" data-tg-print>Export PDF ↓</button>
        ${data.sample_id
          ? `<a class="btn btn-outline" href="/samples.html">Pick another sample →</a>
             <a class="btn btn-outline" href="/intake.html">Try your own idea →</a>`
          : `<a class="btn btn-outline" href="/chamber.html?submission=${escapeHtml(evalRow.submission_id)}">Re-run the panel →</a>`}
        <a class="btn btn-outline" href="/">Home</a>
      </div>

      ${brandFooter}

      <!-- Print-only watermark: hidden on screen, rendered on every
           printed page when the document is in sample mode. -->
      <div class="print-watermark" aria-hidden="true">PREVIEW SAMPLE</div>
    `;

    // Wire the Export PDF button. Native browser print → user picks
    // \"Save as PDF\" in the dialog. Print stylesheet handles layout,
    // chrome stripping, and (for samples) the diagonal SAMPLE watermark.
    // Before printing we force every <details> open so EP reports and
    // Jules's edits print in full, then restore their original states
    // afterward so the on-screen view is unchanged.
    const printBtn = root.querySelector('[data-tg-print]');
    if (printBtn) {
      printBtn.addEventListener('click', () => {
        const detailsEls = root.querySelectorAll('details');
        const priorStates = [];
        detailsEls.forEach(d => { priorStates.push(d.open); d.open = true; });
        try { window.print(); } catch(_){}
        // Restore the on-screen state after the print dialog closes.
        setTimeout(() => {
          detailsEls.forEach((d, i) => { d.open = priorStates[i]; });
        }, 100);
      });
    }
  }

  function renderError(msg){
    root.innerHTML = `
      <div class="state-card state-error">
        <div class="state-text">${escapeHtml(msg)}</div>
        <p style="margin-top:1rem;color:var(--text-dim);">
          Try the <a href="/intake.html" style="color:var(--gold);">intake</a>
          or head <a href="/" style="color:var(--gold);">home</a>.
        </p>
      </div>
    `;
  }

  async function init(){
    const qs = new URLSearchParams(window.location.search);
    const evaluationId = (qs.get('evaluation') || '').trim();
    // Sample mode: load a pre-baked deliverable from /config/sample_deliverables/<id>.json
    // instead of hitting the evaluation endpoint. Same shape; same renderer.
    // Lets the samples library showcase a finished deliverable without
    // requiring a live LLM run.
    const sampleId = (qs.get('sample') || '').trim().replace(/[^a-z0-9_-]/g, '');

    if (!evaluationId && !sampleId){
      renderError('Missing evaluation id. The link you followed did not include one.');
      return;
    }

    const reportUrl = sampleId
      ? '/config/sample_deliverables/' + encodeURIComponent(sampleId) + '.json'
      : (ENDPOINT + '?id=' + encodeURIComponent(evaluationId));

    try {
      const [reportResp, judgesResp] = await Promise.all([
        fetch(reportUrl, sampleId ? { cache: 'no-store' } : undefined),
        fetch(JUDGES_CONFIG, { cache: 'no-store' }),
      ]);
      if (!reportResp.ok){
        const text = await reportResp.text().catch(() => '');
        if (sampleId && reportResp.status === 404){
          throw new Error('That sample deliverable is not yet built. Try a different sample, or run the brief live.');
        }
        throw new Error('Report ' + reportResp.status + ': ' + (text || reportResp.statusText));
      }
      if (!judgesResp.ok) throw new Error('Could not load judges config.');
      const data        = await reportResp.json();
      const judgesData  = await judgesResp.json();
      const judgesById  = Object.fromEntries((judgesData.judges || []).map(j => [j.id, j]));
      renderReport(data, judgesById);
    } catch (err) {
      console.warn('[tg-report]', err);
      renderError(err.message || 'Something went wrong loading the report.');
    }
  }

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
