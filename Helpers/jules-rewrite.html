<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jules's Office · The Rewrite Partner · The Gauntlet</title>
<meta name="description" content="Jules is The Rewrite Partner. In her office she reads your brief and works with you pass by pass until it sounds like the person who had the idea, not a tool that was asked to describe it.">
<link rel="icon" type="image/png" href="../Favicon.png">
<link rel="apple-touch-icon" href="../Favicon.png">
<script src="../assets/tg-voice.js" defer></script>
<script src="../assets/tg-ep-chat.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root,
  :root[data-theme="dark"]{
    --ink:#0a0a0a; --ink-soft:#14151a; --cream:#f4ede0;
    --gold:#b8922a; --gold-light:#d4aa4a; --rule:rgba(184,146,42,0.30);
    --text:#e8dece; --text-dim:#a89c88; --bg:#0a0a0a;
    --crimson:#5a1a1a; --crimson-bright:#c0392b;
    --gauntlet-consequence:#c0392b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Cormorant Garamond',serif;font-size:1.05rem;line-height:1.7;
    min-height:100vh;
  }

  /* ── Topbar ──────────────────────────────────────────────────────────── */
  .tg-topbar{
    display:flex;align-items:center;padding:0 2rem;height:56px;
    border-bottom:1px solid var(--rule);gap:1.5rem;
    position:sticky;top:0;background:rgba(10,10,10,0.92);
    backdrop-filter:blur(10px);z-index:100;
  }
  .tg-topbar-logo{
    display:flex;align-items:center;gap:0.6rem;
    font-family:'Playfair Display',serif;font-size:1rem;letter-spacing:0.12em;
    color:var(--gold);text-decoration:none;white-space:nowrap;
  }
  .tg-topbar-logo img{height:32px;width:32px;display:block;object-fit:contain;}
  .tg-topbar-back{
    margin-left:auto;
    font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.22em;
    text-transform:uppercase;color:var(--text-dim);text-decoration:none;
  }
  .tg-topbar-back:hover{color:var(--gold);}

  /* ── Header strip: Jules's name + photo + voice ─────────────────────── */
  .h-strip{
    max-width:1320px;margin:0 auto;padding:1.4rem 2rem 0.9rem;
    display:flex;align-items:center;gap:1.2rem;
  }
  .h-strip-photo{
    width:64px;height:64px;flex-shrink:0;overflow:hidden;
    border:1px solid var(--rule);background:#14151a;
  }
  .h-strip-photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .h-strip-meta{display:flex;flex-direction:column;gap:0.2rem;flex:1;min-width:0;}
  .h-strip-name{
    font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;
    color:var(--cream);line-height:1.1;
  }
  .h-strip-name em{font-style:italic;color:var(--gold-light);}
  .h-strip-role{
    font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.24em;
    text-transform:uppercase;color:var(--gold);
  }
  .h-strip-voice{
    display:inline-flex;align-items:center;gap:0.5rem;
    border:1px solid var(--rule);background:rgba(0,0,0,0.5);
    color:var(--gold-light);padding:0.55rem 0.95rem;cursor:pointer;
    font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.2em;
    text-transform:uppercase;
    transition:border-color 0.2s,background 0.2s,color 0.2s;
  }
  .h-strip-voice:hover{border-color:var(--gold);background:rgba(184,146,42,0.08);color:var(--gold);}
  .h-strip-voice .play{
    width:18px;height:18px;border:1px solid currentColor;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:0.6rem;line-height:1;
  }

  /* ── Office split layout ────────────────────────────────────────────── */
  .office{
    max-width:1320px;margin:0 auto;
    padding:1rem 2rem 4rem;
    display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);
    gap:1.4rem;
    height:calc(100vh - 56px - 100px);   /* topbar + strip */
    min-height:560px;
  }
  .office-panel{
    display:flex;flex-direction:column;min-height:0;
    border:1px solid var(--rule);background:rgba(255,255,255,0.015);
  }
  .office-panel-head{
    padding:0.8rem 1.1rem;border-bottom:1px solid var(--rule);
    font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.22em;
    text-transform:uppercase;color:var(--gold);
    display:flex;align-items:center;justify-content:space-between;gap:0.8rem;
  }
  .office-panel-head-note{color:var(--text-dim);font-size:0.55rem;}

  /* Brief panel (left) */
  .office-brief{
    flex:1;padding:1.4rem 1.3rem;overflow-y:auto;
    font-family:'Cormorant Garamond',serif;font-size:1.05rem;line-height:1.65;
    color:var(--text);white-space:pre-wrap;
  }
  .office-brief[data-empty="true"]{
    color:var(--text-dim);font-style:italic;
  }

  /* Chat panel (right) */
  .office-chat-thread{
    flex:1;padding:1.1rem 1.1rem 0.6rem;overflow-y:auto;
  }
  .tg-chat-empty{
    color:var(--text-dim);font-style:italic;font-size:0.98rem;
    padding:1rem 0;
  }
  .tg-chat-turn{
    margin-bottom:1.4rem;
    font-family:'Cormorant Garamond',serif;font-size:1rem;line-height:1.55;
  }
  .tg-chat-user{
    margin-left:1.5rem;
    padding:0.6rem 0.9rem;
    background:rgba(212,170,74,0.05);border-left:2px solid var(--gold);
    color:var(--cream);
  }
  .tg-chat-assistant{
    padding:0.2rem 0;
  }
  .tg-chat-who{
    font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.2em;
    text-transform:uppercase;color:var(--gold-light);
    margin-bottom:0.35rem;
  }
  .tg-chat-content{white-space:pre-wrap;}

  /* Revision card inside an assistant turn */
  .tg-chat-revision{
    margin-top:0.8rem;
    border:1px solid var(--rule);background:rgba(184,146,42,0.05);
    padding:0.9rem 1rem;
  }
  .tg-chat-revision.is-accepted{
    border-color:rgba(212,170,74,0.5);background:rgba(212,170,74,0.08);
  }
  .tg-chat-revision.is-rejected{
    border-color:rgba(192,57,43,0.35);background:rgba(192,57,43,0.04);
    opacity:0.7;
  }
  .tg-chat-rev-head{
    font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.18em;
    text-transform:uppercase;color:var(--gold);
    margin-bottom:0.5rem;
  }
  .tg-chat-rev-head strong{color:var(--cream);}
  .tg-chat-rev-rationale{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.92rem;
    color:var(--text-dim);margin-bottom:0.8rem;
  }
  .tg-chat-rev-diff{
    display:flex;flex-direction:column;gap:0.45rem;margin-bottom:0.8rem;
  }
  .tg-chat-rev-before{
    padding:0.5rem 0.7rem;
    background:rgba(0,0,0,0.4);border-left:2px solid rgba(212,170,74,0.35);
    color:var(--text-dim);font-size:0.94rem;line-height:1.5;white-space:pre-wrap;
    text-decoration:line-through;text-decoration-color:rgba(192,57,43,0.5);
  }
  .tg-chat-rev-arrow{
    font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.18em;
    text-transform:uppercase;color:var(--gold);text-align:center;
    padding:0.1rem 0;
  }
  .tg-chat-rev-after{
    padding:0.5rem 0.7rem;
    background:rgba(212,170,74,0.06);border-left:2px solid var(--gold-light);
    color:var(--cream);font-size:0.96rem;line-height:1.5;white-space:pre-wrap;
  }
  .tg-chat-rev-actions{
    display:flex;gap:0.6rem;flex-wrap:wrap;
  }
  .tg-chat-rev-btn{
    font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.18em;
    text-transform:uppercase;cursor:pointer;
    padding:0.6rem 1rem;
    border:1px solid var(--gold);
    transition:all 0.18s;
  }
  .tg-chat-rev-accept{background:var(--gold);color:var(--ink);}
  .tg-chat-rev-accept:hover{background:var(--gold-light);border-color:var(--gold-light);}
  .tg-chat-rev-reject{
    background:transparent;color:var(--text-dim);border-color:var(--rule);
  }
  .tg-chat-rev-reject:hover{border-color:var(--gauntlet-consequence);color:var(--gauntlet-consequence);}

  /* Chat input bar */
  .office-chat-input{
    border-top:1px solid var(--rule);padding:0.85rem 1rem;
    display:flex;gap:0.7rem;align-items:flex-end;
    background:rgba(0,0,0,0.3);
  }
  .office-chat-input textarea{
    flex:1;min-height:54px;max-height:140px;resize:vertical;
    background:rgba(0,0,0,0.45);border:1px solid var(--rule);
    color:var(--cream);
    font-family:'Cormorant Garamond',serif;font-size:1rem;line-height:1.5;
    padding:0.6rem 0.8rem;outline:none;
  }
  .office-chat-input textarea:focus{border-color:var(--gold-light);}
  .office-chat-input textarea::placeholder{color:#7d735f;font-style:italic;}
  .office-chat-send{
    font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.18em;
    text-transform:uppercase;cursor:pointer;
    padding:0.75rem 1.2rem;
    background:var(--gold);color:var(--ink);
    border:1px solid var(--gold);
    transition:all 0.18s;
  }
  .office-chat-send:hover:not(:disabled){background:var(--gold-light);border-color:var(--gold-light);}
  .office-chat-send:disabled{opacity:0.5;cursor:wait;}

  .office-keys{
    font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.16em;
    text-transform:uppercase;color:var(--text-dim);text-align:center;
    padding-bottom:0.45rem;
  }
  .office-keys strong{color:var(--gold-light);}

  @media (max-width:980px){
    .office{
      grid-template-columns:1fr;height:auto;min-height:0;
    }
    .office-brief{max-height:42vh;}
    .office-chat-thread{max-height:48vh;}
  }
</style>
</head>
<body>

<header class="tg-topbar">
  <a class="tg-topbar-logo" href="/">
    <img src="../Favicon.png" alt="" aria-hidden="true">
    THE GAUNTLET
  </a>
  <a class="tg-topbar-back" href="/#corridor-wings">&larr; Back to the corridor</a>
</header>

<!-- Small header strip so the visitor knows who they're talking to.
     The full static profile lived here before EE.1; for EE.1 we keep
     just the identifying chrome and dedicate the page to working. -->
<div class="h-strip">
  <div class="h-strip-photo">
    <img src="Jules_eyes_open.jpg" alt="Jules, The Rewrite Partner">
  </div>
  <div class="h-strip-meta">
    <div class="h-strip-name">Ms. <em>Jules</em></div>
    <div class="h-strip-role">The Rewrite Partner</div>
  </div>
  <button class="h-strip-voice" type="button"
          data-tg-voice data-character="jules" data-mode="role">
    <span class="play" aria-hidden="true">&#9654;</span>Hear her
  </button>
</div>

<main class="office" data-tg-office="ep" data-tg-office-ep-id="jules">
  <section class="office-panel">
    <div class="office-panel-head">
      <span>Your Brief</span>
      <span class="office-panel-head-note">Updates as you accept rewrites</span>
    </div>
    <div class="office-brief" data-tg-office="brief"></div>
  </section>

  <section class="office-panel">
    <div class="office-panel-head">
      <span>Working with Jules</span>
      <span class="office-panel-head-note">Session-only. Closes with the tab.</span>
    </div>
    <div class="office-chat-thread" data-tg-office="chat"></div>
    <div class="office-keys"><strong>&#8984;</strong> + <strong>Enter</strong> to send</div>
    <div class="office-chat-input">
      <textarea data-tg-office="input" placeholder="Tell Jules what you want to work on. Or just say go."></textarea>
      <button class="office-chat-send" type="button" data-tg-office="send">Send</button>
    </div>
  </section>
</main>

</body>
</html>
