<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Greylander Press</title>
<script>(function(){try{var t=localStorage.getItem('gp-theme');if(!t&&localStorage.getItem('gp_theme')==='light'){t='light';localStorage.setItem('gp_theme','light');}if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="assets/tokens.css">
<script src="assets/theme.js" defer></script>
<script src="assets/sitenav.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-serif);font-size:1.05rem;line-height:1.7;min-height:100vh;padding-top:72px;}
  .ct-main{max-width:680px;margin:0 auto;padding:3rem 2.5rem 6rem;}
  .s-label{font-family:var(--font-mono);font-size:0.55rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--accent);margin-bottom:0.5rem;}
  .s-title{font-family:var(--font-display);font-size:2.4rem;font-weight:700;color:var(--text-primary);line-height:1.2;margin-bottom:0.5rem;}
  .s-title em{font-style:italic;color:var(--accent);}
  .s-sub{color:var(--text-muted);font-size:0.95rem;margin-bottom:2rem;}
  .direct-block{border:1px solid var(--border-default);background:var(--accent-soft,rgba(168,42,42,0.04));padding:1.4rem 1.6rem;margin-bottom:2.5rem;text-align:center;}
  .direct-label{font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:0.5rem;}
  .direct-email{font-family:var(--font-display);font-size:1.3rem;color:var(--text-primary);text-decoration:none;border-bottom:1px solid var(--accent);padding-bottom:0.1rem;}
  .direct-email:hover{color:var(--accent);}
  .or-divider{text-align:center;font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--text-muted);margin:2rem 0;position:relative;}
  .or-divider::before, .or-divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border-default);}
  .or-divider::before{left:0;}
  .or-divider::after{right:0;}
  .field{display:block;margin-bottom:1.4rem;}
  .field-label{display:block;font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.5rem;}
  .field-input,.field-select,.field-textarea{width:100%;background:var(--input-bg);border:1px solid var(--input-border);padding:0.75rem 1rem;color:var(--input-text);font-family:var(--font-serif);font-size:1rem;outline:none;}
  .field-input:focus,.field-select:focus,.field-textarea:focus{border-color:var(--input-focus);}
  .field-textarea{min-height:200px;line-height:1.55;resize:vertical;}
  .btn-gold{background:var(--btn-primary-bg);color:var(--btn-primary-text);border:none;padding:0.85rem 2rem;font-family:var(--font-display);font-size:0.95rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;}
  .btn-gold:hover{background:var(--btn-primary-bg-hover);}
  .success{display:none;border:1px solid var(--accent);background:var(--accent-soft,rgba(168,42,42,0.06));padding:2rem;text-align:center;}
  .success.active{display:block;}
  .success-title{font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--text-primary);margin-bottom:0.6rem;}
  .success-body{color:var(--text-muted);}
  /* Honeypot */
  .hp{position:absolute;left:-9999px;}
  @media(max-width:760px){.ct-main{padding:2rem 1.5rem 4rem;}.s-title{font-size:1.7rem;}}
</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LBRZ01WNX1"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-LBRZ01WNX1');
</script>
</head>
<body>

<div id="gp-nav" data-page=""></div>

<main class="ct-main">
  <div class="s-label">Greylander Press</div>
  <h1 class="s-title"><em>Contact.</em></h1>
  <p class="s-sub">Questions about a tool, the imprint, your account, refunds, or anything else. Real human reads every message.</p>

  <div class="direct-block">
    <div class="direct-label">Direct email</div>
    <a class="direct-email" href="mailto:starbucks005@gmail.com">starbucks005@gmail.com</a>
  </div>

  <div class="or-divider">— or use the form —</div>

  <div id="ct-success" class="success">
    <div class="success-title">Message received.</div>
    <div class="success-body">Thanks. We'll reply to the email you provided. Usually within 1–2 business days.</div>
  </div>

  <form id="ct-form" name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/contact.html?sent=1">
    <input type="hidden" name="form-name" value="contact">
    <p class="hp"><label>Don't fill this out: <input name="bot-field"></label></p>

    <div class="field">
      <label class="field-label">Your Name</label>
      <input class="field-input" type="text" name="name" required>
    </div>

    <div class="field">
      <label class="field-label">Your Email</label>
      <input class="field-input" type="email" name="email" required>
    </div>

    <div class="field">
      <label class="field-label">Subject</label>
      <input class="field-input" type="text" name="subject" placeholder="What's this about?" required>
    </div>

    <div class="field">
      <label class="field-label">Message</label>
      <textarea class="field-textarea" name="message" required></textarea>
    </div>

    <button class="btn-gold" type="submit">Send Message →</button>
  </form>
</main>

<script>
  // Show success block if user just submitted
  if (window.location.search.includes('sent=1')) {
    document.getElementById('ct-form').style.display = 'none';
    document.getElementById('ct-success').classList.add('active');
  }
</script>
</body>
</html>
